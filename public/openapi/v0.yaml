---
openapi: 3.0.3
info:
  title: Register of training providers API
  version: v0
servers: []
paths:
  "/api/{api_version}/info":
    get:
      summary: Provides general information about the API
      description: This endpoint can be used to retrieve general information about
        the API.
      tags:
      - Info
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: test_92db1241b8721bddb4540fdbb4b1a56d4bbb54a006bd6086b133ff0ced37eb12
        description: A valid API token must be provided in the Authorization header
          to access this endpoint.
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v0
        description: The API version to use in the request path. This should be set
          to the latest version for this endpoint.
      responses:
        '200':
          description: returns the requested and latest API version and status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: object
                    properties:
                      requested:
                        type: string
                      latest:
                        type: string
                    required:
                    - requested
                    - latest
                required:
                - status
                - version
              example:
                status: ok
                version:
                  requested: v0
                  latest: v0
        '401':
          description: returns 401 Unauthorized for invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
  "/api/{api_version}/providers":
    get:
      summary: Get many providers
      description: |
        This endpoint can be used to retrieve providers for a given academic year.
        This is intended to make it possible to check for new or updated providers regularly.
      tags:
      - providers
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: test_d5ca66c3c2428e27d2562bcc6ea6be3bcad9609fbfa9cb89e691676c8690fd9c
        description: A valid API token must be provided in the Authorization header
          to access this endpoint.
      - name: academic_year
        in: query
        required: false
        schema:
          type: integer
        example: 2025
        description: |
          Filters providers by the specified academic year. The value
          must be a 4-digit year, for example 2025. If not provided, the API will
          return providers active in the current academic year.
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v0
        description: The API version to use in the request path. This should be set
          to the latest version for this endpoint.
      - name: changed_since
        in: query
        required: false
        schema:
          type: string
        example: '2025-09-14T11:34:56Z'
        description: |
          Filters providers to only those updated after the specified timestamp.
          The value must be an ISO 8601 datetime, for example: 2025-09-14T11:34:56Z.
      responses:
        '200':
          description: returns an array of training providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        operating_name:
                          type: string
                        provider_type:
                          type: string
                        code:
                          type: string
                        accreditation_status:
                          type: string
                        ukprn:
                          type: string
                        urn:
                          type: string
                          nullable: true
                        updated_at:
                          type: string
                      required:
                      - id
                      - operating_name
                      - provider_type
                      - code
                      - accreditation_status
                      - ukprn
                      - urn
                      - updated_at
                required:
                - data
              example:
                data:
                - id: 7bcf4928-a0c7-4fa7-aa46-d4297eec31e0
                  operating_name: Higher education institution (HEI) 7320
                  provider_type: hei
                  code: 8BN
                  accreditation_status: unaccredited
                  ukprn: '77336264'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: bc668b2e-9fa2-4bda-a2f4-97f95d391cf8
                  operating_name: Higher education institution (HEI) 9494
                  provider_type: hei
                  code: 7LA
                  accreditation_status: accredited
                  ukprn: '80063525'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: e375bccb-26e8-4dba-a8bc-eca867da9e3b
                  operating_name: Other 7598
                  provider_type: other
                  code: 95D
                  accreditation_status: unaccredited
                  ukprn: '69846690'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: 3c677f94-76cd-4e07-967e-3a6e78f961eb
                  operating_name: Other 9808
                  provider_type: other
                  code: 3IU
                  accreditation_status: accredited
                  ukprn: '17855396'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: 44ea1b4b-e474-4334-930a-5a71eaa3547d
                  operating_name: School 5025
                  provider_type: school
                  code: FA9
                  accreditation_status: unaccredited
                  ukprn: '24625549'
                  urn: '543380'
                  updated_at: '2025-09-15T11:34:56Z'
                - id: 03bfb99e-9e20-4715-9401-f346354fc1e4
                  operating_name: School-centred initial teacher training (SCITT)
                    7475
                  provider_type: scitt
                  code: PAZ
                  accreditation_status: accredited
                  ukprn: '34400987'
                  urn: '443670'
                  updated_at: '2025-09-15T11:34:56Z'
        '401':
          description: returns 401 Unauthorized for invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
