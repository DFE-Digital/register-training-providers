  "/healthcheck":
    get:
      summary: returns 503
      tags:
      - Heartbeat
      responses:
        '200':
          description: returns the expected response report
          content:
            application/json:
              schema:
                type: object
                properties:
                  checks:
                    type: object
                    properties:
                      database:
                        type: boolean
                    required:
                    - database
                required:
                - checks
              example:
                checks:
                  database: true
        '503':
          description: returns 503
          content:
            application/json:
              schema:
                type: object
                properties:
                  checks:
                    type: object
                    properties:
                      database:
                        type: boolean
                    required:
                    - database
                required:
                - checks
              example:
                checks:
                  database: false
