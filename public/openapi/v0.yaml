  "/sha":
    get:
      summary: returns the sha from the env var COMMIT_SHA
      tags:
      - Heartbeat
      responses:
        '200':
          description: returns the sha from the env var COMMIT_SHA
          content:
            application/json:
              schema:
                type: object
                properties:
                  sha:
                    type: string
                required:
                - sha
              example:
                sha: deadbeef
