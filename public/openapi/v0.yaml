---
openapi: 3.0.3
info:
  title: Register of training providers API
  version: v0
servers: []
paths:
  "/api/{api_version}/info":
    get:
      summary: Provides general information about the API
      tags:
      - Info
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: test_92db1241b8721bddb4540fdbb4b1a56d4bbb54a006bd6086b133ff0ced37eb12
        description: A valid API token must be provided in the Authorization header
          to access this endpoint.
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v0
        description: |
          The API version to use in the request path.
          This should be set to the latest version for this endpoint.
      responses:
        '200':
          description: returns the requested and latest API version and status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: The status of the request.
                    example: ok
                  version:
                    type: object
                    properties:
                      requested:
                        type: string
                        description: The requested API version.
                        example: v0
                      latest:
                        type: string
                        description: The latest available API version.
                        example: v0
                    required:
                    - requested
                    - latest
                required:
                - status
                - version
              example:
                status: ok
                version:
                  requested: v0
                  latest: v0
        '401':
          description: returns 401 Unauthorized for invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
      description: This endpoint can be used to retrieve general information about
        the API.
  "/api/{api_version}/providers":
    get:
      summary: Get many providers
      tags:
      - providers
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: test_fda0394f00193ea2c4c4c0c04998bd9786034fa9f51392a48205de0776aee353
        description: A valid API token must be provided in the Authorization header
          to access this endpoint.
      - name: academic_year
        in: query
        required: false
        schema:
          type: integer
        example: 2025
        description: |
          Filters providers by the specified academic year.
          The value must be a 4-digit year, for example 2025.

          If not provided, the API will return providers active in the current academic year.
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v0
        description: |
          The API version to use in the request path.
          This should be set to the latest version for this endpoint.
      - name: changed_since
        in: query
        required: false
        schema:
          type: string
        example: '2025-09-14T11:34:56Z'
        description: |
          Filters providers to only those updated after the specified timestamp.
          The value must be an ISO 8601 datetime, for example: 2025-09-14T11:34:56Z.
      responses:
        '200':
          description: returns an array of training providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: The unique UUID identifier for the training
                            provider.
                          example: 7bcf4928-a0c7-4fa7-aa46-d4297eec31e0
                        operating_name:
                          type: string
                          description: The primary business or operating name of the
                            training provider.
                          example: Bobby Jacob University
                        provider_type:
                          type: string
                          description: The classification of the provider.
                          enum:
                          - hei
                          - scitt
                          - school
                          - other
                          example: hei
                        code:
                          type: string
                          description: The unique 3-character identifier code for
                            the provider.
                          example: 1BJ
                        accreditation_status:
                          type: string
                          description: The current accreditation status of the provider.
                          enum:
                          - accredited
                          - unaccredited
                          example: accredited
                        ukprn:
                          type: string
                          description: The 8-digit UK Provider Reference Number.
                          example: '77336264'
                        urn:
                          type: string
                          nullable: true
                          description: The 6-digit Unique Reference Number for schools.
                          example: '543380'
                        updated_at:
                          type: string
                          description: The ISO 8601 timestamp of when the provider
                            record was last modified.
                          format: date-time
                          example: '2025-09-15T11:34:56Z'
                      required:
                      - id
                      - operating_name
                      - provider_type
                      - code
                      - accreditation_status
                      - ukprn
                      - urn
                      - updated_at
                    description: An array of training provider objects matching the
                      specified filters.
                required:
                - data
              example:
                data:
                - id: 883ed70f-fae9-4851-8828-a5bc8a3aa68d
                  operating_name: Higher education institution (HEI) 1353
                  provider_type: hei
                  code: 33O
                  accreditation_status: unaccredited
                  ukprn: '90452308'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: e1eee31a-2214-4b0e-9627-f4877bcf4928
                  operating_name: Higher education institution (HEI) 1632
                  provider_type: hei
                  code: 4MQ
                  accreditation_status: accredited
                  ukprn: '31673362'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: 5d391cf8-18ef-4797-947a-c83b7d43a8f7
                  operating_name: Other 5711
                  provider_type: other
                  code: LAX
                  accreditation_status: unaccredited
                  ukprn: '10635251'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: 3796d12c-e287-42e0-a375-bccb26e84dba
                  operating_name: Other 9765
                  provider_type: other
                  code: 0Y9
                  accreditation_status: accredited
                  ukprn: '45984669'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: 78f961eb-9efe-47e4-b9a9-f3d30bf307fc
                  operating_name: School 9808
                  provider_type: school
                  code: M4V
                  accreditation_status: unaccredited
                  ukprn: '49648044'
                  urn: '940785'
                  updated_at: '2025-09-15T11:34:56Z'
                - id: 130a5a71-eaa3-447d-94c1-afadedcfa379
                  operating_name: School-centred initial teacher training (SCITT)
                    1254
                  provider_type: scitt
                  code: FA9
                  accreditation_status: accredited
                  ukprn: '24625549'
                  urn: '533804'
                  updated_at: '2025-09-15T11:34:56Z'
        '401':
          description: returns 401 Unauthorized for invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
      description: |
        This endpoint can be used to retrieve providers for a given academic year.
        This is intended to make it possible to check for new or updated providers regularly.
