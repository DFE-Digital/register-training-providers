  "/accreditations/new":
    get:
      summary: redirects to sign in
      tags:
      - Accreditation
      parameters:
      - name: provider_id
        in: query
        required: false
        schema:
          type: string
        example: 6396614c-0d12-4bc5-957b-a82a9e71fa81
      responses:
        '302':
          description: redirects to sign in
          content:
            text/html:
              schema:
                type: string
              example: ''
  "/api/{api_version}/info":
    get:
      summary: Provides general information about the API
      description: This endpoint can be used to retrieve general information about
        the API.
      tags:
      - Info
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: test_a9a8817fafafe2d2627a4e012dc0ec26907fe1951564bfd443fbc1e61056e3bf
        description: A valid API token must be provided in the Authorization header
          to access this endpoint.
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v0
        description: The API version to use in the request path. This should be set
          to the latest version for this endpoint.
      responses:
        '200':
          description: returns the requested and latest API version and status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: object
                    properties:
                      requested:
                        type: string
                      latest:
                        type: string
                    required:
                    - requested
                    - latest
                required:
                - status
                - version
              example:
                status: ok
                version:
                  requested: v0
                  latest: v0
        '401':
          description: returns 401 Unauthorized for invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
