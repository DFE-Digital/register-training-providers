---
openapi: 3.0.3
info:
  title: Register of training providers API
  version: v0
servers: []
paths:
  "/api/{api_version}/info":
    get:
      summary: Provides general information about the API
      description: This endpoint can be used to retrieve general information about
        the API.
      tags:
      - Info
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: test_92db1241b8721bddb4540fdbb4b1a56d4bbb54a006bd6086b133ff0ced37eb12
        description: A valid API token must be provided in the Authorization header
          to access this endpoint.
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v0
        description: The API version to use in the request path. This should be set
          to the latest version for this endpoint.
      responses:
        '200':
          description: returns the requested and latest API version and status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: object
                    properties:
                      requested:
                        type: string
                      latest:
                        type: string
                    required:
                    - requested
                    - latest
                required:
                - status
                - version
              example:
                status: ok
                version:
                  requested: v0
                  latest: v0
        '401':
          description: returns 401 Unauthorized for invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
  "/api/{api_version}/providers":
    get:
      summary: Get many providers
      description: |
        This endpoint can be used to retrieve providers for a given academic year.
        This is intended to make it possible to check for new or updated providers regularly.
      tags:
      - providers
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: test_cd04a04e71ec3e6682d2f574709228f5a75ca7682f539b3a88a70c23c601c25f
        description: A valid API token must be provided in the Authorization header
          to access this endpoint.
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v0
        description: The API version to use in the request path. This should be set
          to the latest version for this endpoint.
      - name: changed_since
        in: query
        required: false
        schema:
          type: string
        example: '2025-09-14T11:34:56Z'
        description: |
          Filters providers to only those updated after the specified timestamp.
          The value must be an ISO 8601 datetime, for example: 2025-09-14T11:34:56Z.
      responses:
        '200':
          description: returns an array of training providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        operating_name:
                          type: string
                        provider_type:
                          type: string
                        code:
                          type: string
                        accreditation_status:
                          type: string
                        updated_at:
                          type: string
                      required:
                      - id
                      - operating_name
                      - provider_type
                      - code
                      - accreditation_status
                      - updated_at
                required:
                - data
              example:
                data:
                - id: b1d35cf4-df58-4370-953c-93b7ab89ad6f
                  operating_name: Higher education institution (HEI) 8073
                  provider_type: hei
                  code: 2AD
                  accreditation_status: accredited
                  updated_at: '2025-09-15T11:34:56Z'
        '401':
          description: returns 401 Unauthorized for invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
