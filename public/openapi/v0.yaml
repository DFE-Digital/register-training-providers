                \ \n  \n</header>\n\n\n    <section aria-label=\"Service information\"
                class=\"govuk-service-navigation\" data-module=\"govuk-service-navigation\"><div
                class=\"govuk-width-container\"><div class=\"govuk-service-navigation__container\"><span
                class=\"govuk-service-navigation__service-name\"><a class=\"govuk-service-navigation__link\"
                href=\"/\">Register of training providers</a></span></div></div></section>\n\n
                \   <div class=\"app-phase-banner app-phase-banner__env--test\">\n
                \     <div class=\"govuk-width-container\">\n        <div class=\"govuk-phase-banner\">\n
                \ <p class=\"govuk-phase-banner__content\">\n    <strong class=\"govuk-tag
                govuk-phase-banner__content__tag\"><span class=\"translation_missing\"
                title=\"translation missing: en.service.phase_banner.test\">Test</span></strong>\n
                \   <span class=\"govuk-phase-banner__text\">This is a new service
                – your <a class=\"govuk-link\" href=\"mailto:becomingateacher@digital.education.gov.uk\">feedback</a>
                will help us to improve it.</span>\n  </p>\n</div>\n      </div>\n
                \   </div>\n\n    <div class=\"govuk-width-container\">\n      \n
                \ <div class=\"govuk-breadcrumbs\">\n  <ol class=\"govuk-breadcrumbs__list\">\n
                \     <li class=\"govuk-breadcrumbs__list-item\"><a class=\"govuk-breadcrumbs__link\"
                href=\"/\">Home</a></li>\n  </ol>\n</div>\n\n      <main class=\"govuk-main-wrapper\"
                id=\"main-content\" role=\"main\">\n        <div class=\"govuk-grid-row\">\n
                \         <div class=\"govuk-grid-column-full\">\n            \n          </div>\n
                \       </div>\n\n          <div class=\"govuk-grid-row\">\n            <div
                class=\"govuk-grid-column-two-thirds\">\n              <h1 class=\"govuk-heading-l\">Accessibility
                statement for the Register of training providers</h1>\n            </div>\n
                \         </div>\n          \n          <div class=\"govuk-grid-row\">\n
                \           <div class=\"govuk-grid-column-two-thirds\">\n              <!--
                markdownlint-disable MD033 -->\n<p class=\"govuk-body-m\">This accessibility
                statement applies to the Register of training providers.</p>\n<p class=\"govuk-body-m\">This
                website is run by the Department for Education. We want as many people
                as possible to be able to use this website. For example, that means
                you should be able to:</p>\n<ul class=\"govuk-list govuk-list--bullet\">\n
                \ <li>change colours, contrast levels and fonts</li>\n<li>zoom in
                up to 400% without the text spilling off the screen</li>\n<li>navigate
                most of the website using just a keyboard</li>\n<li>navigate most
                of the website using speech recognition software</li>\n<li>listen
                to most of the website using a screen reader (including the most recent
                versions of JAWS, NVDA and VoiceOver)</li>\n\n</ul>\n<p class=\"govuk-body-m\">We’ve
                also made the website text as simple as possible to understand.</p>\n<p
                class=\"govuk-body-m\"><a href=\"https://mcmw.abilitynet.org.uk/\"
                target=\"_blank\" rel=\"noreferrer nofollow\" class=\"govuk-link\">AbilityNet
                (opens in new tab)</a> has advice on making your device easier to
                use if you have a disability.</p>\n<h2 id=\"how-accessible-this-website-is\"
                class=\"govuk-heading-m\">How accessible this website is</h2>\n<p
                class=\"govuk-body-m\">The content is non-accessible for the following
                reasons:</p>\n<h3 id=\"specific-error-suggestions-are-not-provided-for-some-fields-on-forms\"
                class=\"govuk-heading-s\">Specific error suggestions are not provided
                for some fields on forms</h3>\n<p class=\"govuk-body-m\">This can
                be seen on date fields, if the user inputs an incorrectly formatted
                date, the error message does not provide a suggestion on how to rectify
                it. This fails WCAG 2.2 success criterion 3.3.1 Error Identification.</p>\n<p
                class=\"govuk-body-m\">We’re waiting on third parties to assist with
                remediation so a fix date cannot be provided.</p>\n<h3 id=\"unsupported-aria-attributes-are-present-on-some-form-inputs\"
                class=\"govuk-heading-s\">Unsupported ARIA attributes are present
                on some form inputs</h3>\n<p class=\"govuk-body-m\">This may cause
                issues for users of assistive technology. This fails WCAG 2.2 success
                criterion 4.1.2 Name, Role, Value.</p>\n<p class=\"govuk-body-m\">We’re
                waiting on third parties to assist with remediation so a fix date
                cannot be provided.</p>\n<h3 id=\"while-navigating-with-jaws-parts-of-error-messages-are-announced-multiple-times\"
                class=\"govuk-heading-s\">While navigating with JAWS, parts of error
                messages are announced multiple times</h3>\n<p class=\"govuk-body-m\">This
                fails WCAG 2.2 success criterion 4.1.2 Name. Role, Value.</p>\n<p
                class=\"govuk-body-m\">We’re waiting on third parties to assist with
                remediation so a fix date cannot be provided.</p>\n<h2 id=\"feedback-and-contact-information\"
                class=\"govuk-heading-m\">Feedback and contact information</h2>\n<p
                class=\"govuk-body-m\">If you need information on this website in
                a different format like accessible PDF, large print, easy read, audio
                recording or braille:</p>\n<p class=\"govuk-body-m\">email <a href=\"mailto:becomingateacher@digital.education.gov.uk\"
                class=\"govuk-link\">becomingateacher@digital.education.gov.uk</a></p>\n<p
                class=\"govuk-body-m\">We’ll consider your request and get back to
                you in 5 days.</p>\n<h2 id=\"reporting-accessibility-problems-with-this-website\"
                class=\"govuk-heading-m\">Reporting accessibility problems with this
                website</h2>\n<p class=\"govuk-body-m\">We’re always looking to improve
                the accessibility of this website. If you find any problems not listed
                on this page or think we’re not meeting accessibility requirements,
                contact: <a href=\"mailto:becomingateacher@digital.education.gov.uk?subject=Accessibility\"
                class=\"govuk-link\">becomingateacher@digital.education.gov.uk</a>
                Include ‘Accessibility’ in the subject line of your email.</p>\n<h2
                id=\"enforcement-procedure\" class=\"govuk-heading-m\">Enforcement
                procedure</h2>\n<p class=\"govuk-body-m\">The Equality and Human Rights
                Commission (EHRC) is responsible for enforcing the Public Sector Bodies
                (Websites and Mobile Applications) (No. 2) Accessibility Regulations
                2018 (the ‘accessibility regulations’). If you’re not happy with how
                we respond to your complaint, <a href=\"https://www.equalityadvisoryservice.com/\"
                target=\"_blank\" rel=\"noreferrer nofollow\" class=\"govuk-link\">contact
                the Equality Advisory and Support Service (opens in new tab)</a>.</p>\n<h2
                id=\"technical-information-about-this-website-s-accessibility\" class=\"govuk-heading-m\">Technical
                information about this website’s accessibility</h2>\n<p class=\"govuk-body-m\">The
                Department for Education is committed to making its websites accessible,
                in accordance with the Public Sector Bodies (Websites and Mobile Applications)
                (No. 2) Accessibility Regulations 2018.</p>\n<h2 id=\"compliance-status\"
                class=\"govuk-heading-m\">Compliance status</h2>\n<p class=\"govuk-body-m\">This
                website is partially compliant with the WCAG (Web Content Accessibility
                Guidelines) version 2.2 AA standard, due to the following non-compliances
                (and/or) the following exemptions.</p>\n<h3 id=\"disproportionate-burden\"
                class=\"govuk-heading-s\">Disproportionate burden</h3>\n<p class=\"govuk-body-m\">We
                have determined that there is disproportionate burden to meet all
                the requirements for the following reasons:</p>\n<p class=\"govuk-body-m\">Currently
                the service is for internal use only. Once more people are using the
                service we will ensure all standards are met.</p>\n<p class=\"govuk-body-m\">Last
                updated 15 July 2025</p>\n\n<!-- markdownlint-enable MD033 -->\n            </div>\n
