---
openapi: 3.0.3
info:
  title: Register of training providers API
  version: v0
servers: []
paths:
  "/api/{api_version}/info":
    get:
      summary: Provides general information about the API
      tags:
      - Info
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: test_fbeaab741142c00560093790fcd4915db92e981d3af02539f40b9f211240a67f
        description: A valid API token must be provided in the Authorization header
          to access this endpoint.
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v0
        description: |
          The API version to use in the request path.
          This should be set to the latest version for this endpoint.
      responses:
        '200':
          description: returns the requested and latest API version and status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: The status of the request.
                    example: ok
                  version:
                    type: object
                    properties:
                      requested:
                        type: string
                        description: The requested API version.
                        example: v0
                      latest:
                        type: string
                        description: The latest available API version.
                        example: v0
                    required:
                    - requested
                    - latest
                required:
                - status
                - version
              example:
                status: ok
                version:
                  requested: v0
                  latest: v0
        '401':
          description: returns 401 Unauthorized for invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
      description: This endpoint can be used to retrieve general information about
        the API.
  "/api/{api_version}/providers":
    get:
      summary: Get many providers
      tags:
      - providers
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
        example: test_10f697511912efc58705f64cd7df5ab508cf35c37cab549abe2b6e7a2a038fff
        description: A valid API token must be provided in the Authorization header
          to access this endpoint.
      - name: academic_year
        in: query
        required: false
        schema:
          type: integer
        example: 2025
        description: |
          Filters providers by the specified academic year.
          The value must be a 4-digit year, for example 2025.

          If not provided, the API will return providers active in the current academic year.
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v0
        description: |
          The API version to use in the request path.
          This should be set to the latest version for this endpoint.
      - name: changed_since
        in: query
        required: false
        schema:
          type: string
        example: '2025-09-14T11:34:56Z'
        description: |
          Filters providers to only those updated after the specified timestamp.
          The value must be an ISO 8601 datetime, for example: 2025-09-14T11:34:56Z.
      responses:
        '200':
          description: returns an array of training providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: The unique UUID identifier for the training
                            provider.
                          example: 7bcf4928-a0c7-4fa7-aa46-d4297eec31e0
                        operating_name:
                          type: string
                          description: The primary business or operating name of the
                            training provider.
                          example: Bobby Jacob University
                        provider_type:
                          type: string
                          description: The classification of the provider.
                          enum:
                          - hei
                          - scitt
                          - school
                          - other
                          example: hei
                        code:
                          type: string
                          description: The unique 3-character identifier code for
                            the provider.
                          example: 1BJ
                        accreditation_status:
                          type: string
                          description: The current accreditation status of the provider.
                          enum:
                          - accredited
                          - unaccredited
                          example: accredited
                        ukprn:
                          type: string
                          description: The 8-digit UK Provider Reference Number.
                          example: '77336264'
                        urn:
                          type: string
                          nullable: true
                          description: The 6-digit Unique Reference Number for schools.
                          example: '543380'
                        updated_at:
                          type: string
                          description: The ISO 8601 timestamp of when the provider
                            record was last modified.
                          format: date-time
                          example: '2025-09-15T11:34:56Z'
                      required:
                      - id
                      - operating_name
                      - provider_type
                      - code
                      - accreditation_status
                      - ukprn
                      - urn
                      - updated_at
                    description: An array of training provider objects matching the
                      specified filters.
                required:
                - data
              example:
                data:
                - id: 37a744e0-40e1-4be1-bac6-f844e3035716
                  operating_name: Higher education institution (HEI) 2462
                  provider_type: hei
                  code: VFJ
                  accreditation_status: unaccredited
                  ukprn: '44564753'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: e455c483-ed5b-4207-becd-af1e735898c0
                  operating_name: Higher education institution (HEI) 7709
                  provider_type: hei
                  code: PAZ
                  accreditation_status: accredited
                  ukprn: '34400987'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: 2b791634-cceb-489d-aecd-f508a675ff4e
                  operating_name: Other 1996
                  provider_type: other
                  code: RGQ
                  accreditation_status: accredited
                  ukprn: '89186965'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: f5a66d76-1313-4bed-92d0-3d57a4939658
                  operating_name: Other 3576
                  provider_type: other
                  code: 9T7
                  accreditation_status: unaccredited
                  ukprn: '66322726'
                  urn:
                  updated_at: '2025-09-15T11:34:56Z'
                - id: 42adfd01-d4db-4601-8ba8-08251aaa21a1
                  operating_name: School 3699
                  provider_type: school
                  code: YP8
                  accreditation_status: unaccredited
                  ukprn: '10792824'
                  urn: '421472'
                  updated_at: '2025-09-15T11:34:56Z'
                - id: 10bdc5c7-009b-45cf-bc95-5ce192250b1a
                  operating_name: School-centred initial teacher training (SCITT)
                    6932
                  provider_type: scitt
                  code: ALV
                  accreditation_status: accredited
                  ukprn: '95696736'
                  urn: '806304'
                  updated_at: '2025-09-15T11:34:56Z'
        '401':
          description: returns 401 Unauthorized for invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
      description: |
        This endpoint can be used to retrieve providers for a given academic year.
        This is intended to make it possible to check for new or updated providers regularly.
